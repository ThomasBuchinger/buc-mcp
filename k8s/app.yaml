apiVersion: apps/v1
kind: Deployment
metadata:
  name: buc-mcp
  labels:
    app: buc-mcp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: buc-mcp
  template:
    metadata:
      labels:
        app: buc-mcp
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: buc-mcp
          image: buc-mcp:latest
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: buc-mcp
  labels:
    app: buc-mcp
spec:
  type: ClusterIP
  selector:
    app: buc-mcp
  ports:
    - port: 80
      targetPort: 8000

