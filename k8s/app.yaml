apiVersion: apps/v1
kind: Deployment
metadata:
  name: buc-mcp
  labels:
    app.kubernetes.io/name: buc-mcp
    app.kubernetes.io/version: 0.2.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: buc-mcp
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: buc-mcp
        app.kubernetes.io/version: 0.2.0
    spec:
      containers:
      - name: buc-mcp
        image: ghcr.io/thomasbuchinger/buc-mcp:v0.2.0
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8000
        resources:
          requests:
            cpu: "10m"
            memory: "256Mi"
          limits:
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health/live
            port: http
          initialDelaySeconds: 3
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        securityContext:
          runAsNonRoot: true
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          privileged: false
          capabilities:
            drop:
            - "ALL"
          seccompProfile:
            type: RuntimeDefault
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      - name: mcp-inspector
        image: ghcr.io/modelcontextprotocol/inspector:0.21.2-hotfix-3
        imagePullPolicy: IfNotPresent
        ports:
        - name: mcpi
          containerPort: 6274
        - name: mcpi-server
          containerPort: 6277
        env:
        - name: DANGEROUSLY_OMIT_AUTH
          value: "true"
        - name: HOST
          value: 0.0.0.0
        - name: MCP_AUTO_OPEN_ENABLED
          value: "false"
        - name: MCP_PROXY_FULL_ADDRESS
          value: inspector-proxy.10.0.0.190.nip.io
        resources:
          requests:
            cpu: "10m"
            memory: "1Mi"
          limits:
            memory: "256Mi"
        # livenessProbe:
        #   httpGet:
        #     path: /health/live
        #     port: http
        #   initialDelaySeconds: 3
        #   periodSeconds: 10
        # readinessProbe:
        #   httpGet:
        #     path: /health/ready
        #     port: http
        #   initialDelaySeconds: 5
        #   periodSeconds: 10
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          runAsNonRoot: true
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          privileged: false
          capabilities:
            drop:
            - "ALL"
          seccompProfile:
            type: RuntimeDefault
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      serviceAccountName: buc-mcp
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: buc-mcp
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      enableServiceLinks: false
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: buc-mcp
  labels:
    app.kubernetes.io/name: buc-mcp
    app.kubernetes.io/version: 0.2.0
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: buc-mcp
---
apiVersion: v1
kind: Service
metadata:
  name: buc-mcp
  labels:
    app.kubernetes.io/name: buc-mcp
    app.kubernetes.io/version: 0.2.0
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: buc-mcp
  ports:
  - name: http
    port: 80
    targetPort: 8000
  - name: mcpi
    port: 6274
    targetPort: mcpi
  - name: mcpi-server
    port: 6277
    targetPort: mcpi-server
